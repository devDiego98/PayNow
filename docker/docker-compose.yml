services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://paygate:paygate@db:5432/paygate
      REDIS_URL: redis://redis:6379
    depends_on:
      - db
      - redis
    volumes:
      - ..:/app
      - /app/node_modules

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: paygate
      POSTGRES_PASSWORD: paygate
      POSTGRES_DB: paygate
    # Host 5433 avoids clashing with another Postgres on localhost:5432 (e.g. Homebrew).
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
